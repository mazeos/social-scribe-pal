services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - "traefik.http.routers.script.rule=Host(`script.mazefunnels.io`)"
      - traefik.http.routers.script.entrypoints=websecure
      - traefik.http.routers.script.tls.certresolver=letsencrypt
      - traefik.http.services.script.loadbalancer.server.port=80

networks:
  traefik-public:
    external: true
